# EMNLP rework: Qwen3-1.7B-Instruct, full fine-tuning, tagged prose.
#
# How this differs from configs/config.psc.yaml (the existing Phase-2 baseline):
#   - lm_name: Qwen3-8B → Qwen3-1.7B-Instruct  (~5× smaller, full-FT-friendly)
#   - lora_rank: 16 → 0  (full FT — train all LM weights)
#   - lr_lora removed, lr_lm: 1.0e-5 added  (lower LR for full FT)
#   - tagged_mode: true  (registers 9 tags via add_tokens(special_tokens=False)
#     so they survive decode(skip_special_tokens=True); see src/feature_tags.py)
#   - gradient_checkpointing: true  (mandatory for full-FT memory budget)
#   - max_target_length: 384 → 224  (catalog trimmed 16→8 features; each clip
#     now has ~9 tagged spans instead of ~16, descriptions drop to ~180 tokens)
#   - descriptions_path: points to the tagged JSON (re-verbalize with
#     `scripts/feature_verbalization.py --tagged` first)
#
# See scratch/EMNLP_REWORK_PLAN_20260511.md for the decision rationale.

# ── Model ──────────────────────────────────────────────
lm_name: "Qwen/Qwen3-1.7B-Instruct"
adapter_variant: "film-mamba"

# Full fine-tuning: lora_rank: 0 disables the PEFT wrap and trains all LM
# weights. Keep lora_alpha / targets / dropout for forward-compat (ignored).
lora_rank: 0
lora_alpha: 32
lora_targets: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
lora_dropout: 0.05

# Tagged-prose mode: registers per-section + per-feature special tokens before
# training so the model can emit <sec_X>…</sec> and <f_*>…</f> spans directly.
# See src/section_tags.py for the catalog (6 sections, 9 inner feature tags).
tagged_mode: true

# Section-query design (Path 3 of the EMNLP rework). When use_sections=true:
#   - 6 <sec_X> section tags + 1 shared </sec> close registered alongside
#     the 9 <f_*> inner feature tags (all via add_tokens(special_tokens=False)).
#   - A pretrained spec encoder (BEATs by default) produces 2D patch
#     embeddings for each clip. Patches are precomputed via
#     scripts/preprocess_beats.py and cached into the per-clip .pt files
#     under the key "beats_patches".
#   - SectionQueryHead has 6 learnable queries (one per section). At every
#     <sec_X> emission, the corresponding query cross-attends to the spec
#     patches, the resulting attention map is saved per clip, and the
#     attended audio summary is residually injected into the LM input
#     embedding at that position.
use_sections: true

# Spec encoder configuration. Default is BEATs (vendored under src/beats/);
# AST is available via spec_encoder_name="ast" — see src/spec_encoder.py.
spec_encoder_name: "beats"
spec_checkpoint_name: "BEATs_iter3_plus_AS2M.pt"   # on lpepino/beats_ckpts (HF Hub)
spec_d_patch: 768            # BEATs encoder_embed_dim; AST hidden_size is also 768
spec_freeze: true            # frozen pretrained — only the cross-attention learns

# Section cross-attention dims (internal). Small relative to d_lm; ~1M params total.
section_d_k: 256
section_d_v: 256

# Section query source:
#   "static"  — per-section learnable query embedding. Single LM forward per
#               step. Cheap, doesn't depend on prior text — recommended on
#               40-GB GPUs.
#   "dynamic" — query is the LM's hidden state at the <sec_X> position,
#               projected through W_q. Two-pass forward (pass 1 extracts h_t,
#               pass 2 computes the CE loss with e_t injected). LM learns to
#               produce query-friendly hidden states; matches the professor's
#               "the model generates a query vector" framing literally. ~1.5×
#               training compute and memory; fits H100 80 GB.
section_query_mode: "dynamic"

# Whether BEATs patches are precomputed and cached into the .pt files (recommended).
# false → would re-run BEATs every batch (~10-20% slower, not supported in v1
# because waveforms aren't in the .pt files).
beats_cached: true

# ── Optimizer ──────────────────────────────────────────────
optimizer: "adamw"
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8
lr_adapter: 1.0e-4   # unchanged from Phase-2
lr_lm: 1.0e-5        # full-FT LR — lower than the old lr_lora=2e-5 to avoid
                     # catastrophic forgetting of pretraining distribution.
weight_decay: 0.01
grad_clip: 1.0

# ── Scheduler ──────────────────────────────────────────────
lr_scheduler: "cosine"
warmup_ratio: 0.03
min_lr_ratio: 0.0

# ── Training ──────────────────────────────────────────────
bf16: true
batch_size: 6                  # 1.7B + full FT + 4 overlap chans → 6 fits 40GB
gradient_accumulation_steps: 1
gradient_checkpointing: true   # mandatory at full FT to stay under 40GB
epochs: 15                     # same trajectory shape as the Phase-2 v2 config
seed: 73
max_target_length: 224         # 7-feature catalog → ~9 spans → ~180-200 tok median
max_nums_length: 64            # bare-nums target is 7 slots ≈ 50 tokens
resume_from: null

# ── Data ──────────────────────────────────────────────
# IMPORTANT: re-verbalize before training, e.g.:
#   python scripts/feature_verbalization.py --tagged \
#     --input features/<split>.csv --output verbalized_tagged/<split>.csv
# then rebuild descriptions.json with merge_verbalized_to_json.py and point
# descriptions_path at it.
data_dir: "/ocean/projects/cis260125p/shared/data/processed_pyannote"
descriptions_path: "/ocean/projects/cis260125p/shared/data/descriptions_tagged.json"
features_path: "/ocean/projects/cis260125p/shared/data/features.json"
features_csv:
  train: "/ocean/projects/cis260125p/shared/data/features_pyannote/train-100.csv"
  val:   "/ocean/projects/cis260125p/shared/data/features_pyannote/dev.csv"
num_workers: 4
pin_memory: true

# ── B-full multi-task loss weights (same as Phase-2 v2) ──────────────
lambda_prose: 1.0
lambda_nums:  0.3
lambda_mse:   0.3

# ── Evaluation ──────────────────────────────────────────────
eval_every_epoch: 1
prompt: "Describe the quality of this recording."
prompt_prose: "Describe the quality of this recording."
prompt_nums:  "List the numerical features of this recording:"
val_sfs_n: 32

# ── Generation ──────────────────────────────────────────────
temperature: 1.0
top_k: 0
top_p: 1.0

# ── Saving ──────────────────────────────────────────────
save_dir: "/ocean/projects/cis260125p/shared/checkpoints/qwen3_17b_full_ft_tagged_v1"

# ── Logging ──────────────────────────────────────────────
wandb_project: "idl-ablation"
wandb_run_name: null
log_every: 10
