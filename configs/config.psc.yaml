# NOTE: This is the Phase-2 baseline config (Qwen3-8B + LoRA + legacy untagged
# prose). It backs the report's existing checkpoints. For the EMNLP rework
# (Qwen3-1.7B + full FT + tagged prose) use configs/config.psc.emnlp.yaml.

# ── Model ──────────────────────────
lm_name: "Qwen/Qwen3.5-9B" # swappeable to other models; see README LM table
adapter_variant: "film-mamba"
lora_rank: 16 # set to 0 to disable LoRA and full-fine-tune (see config.psc.emnlp.yaml)
lora_alpha: 32 # can go up after variant ablations; use use_rslora=True when expanding capacity
lora_targets: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
lora_dropout: 0.05

# tagged_mode: when true, registers per-feature <f_*> special tokens at training
# start and expects descriptions.json to be the tagged-prose variant. Default
# is false to keep the Phase-2 / Qwen3-8B baseline reproducible.
tagged_mode: false

# ── Optimizer ──────────────────────────
optimizer: "adamw"
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8
lr_adapter: 1.0e-4
lr_lora: 2.0e-5
weight_decay: 0.01
grad_clip: 1.0

# ── Scheduler ──────────────────────────
lr_scheduler: "cosine"
warmup_ratio: 0.03
min_lr_ratio: 0.0

# ── Training ──────────────────────────
bf16: True
batch_size: 6
gradient_accumulation_steps: 1 # change to 2 or larger if training unstable
gradient_checkpointing: false
epochs: 15 # v2 SFS_F1 trajectory: +0.022/ep (1-5), +0.0056/ep (5-10) — still climbing but decelerating
           # 4×. Extra 5 epochs likely buys ~+0.02-0.03 F1; 25 was wishful (val_nums/mse overfit
           # eventually). best.pt saves on peak val_sfs_f1 so post-peak epochs are wasted compute,
           # not a quality risk. If by ep 12-13 the curve is dead-flat, kill the run early.
seed: 73
max_target_length: 384  # bumped from 256 — covers p99 of current corpus (~300 tokens) with margin.
                        # Run scratch/analyze_token_lengths.py against full descriptions.json to confirm.
max_nums_length: 96     # token cap for B-full's bare-numbers target ("snr=15.66 hnr=8.34 ..." ≈ 80 tokens)
resume_from: null  # path to checkpoint to resume, e.g. "./checkpoints/last.pt"

# ── Data ──────────────────────────
# Use Pyannote-on-mix outputs for model input (cross-domain consistent: same input
# distribution at train and test). SFS GT continues to come from descriptions.json
# which was verbalized from Silero-on-stems oracle features.
data_dir: "/ocean/projects/cis260125p/shared/data/processed_pyannote"
descriptions_path: "/ocean/projects/cis260125p/shared/data/descriptions.json"
features_path: "/ocean/projects/cis260125p/shared/data/features.json"  # path to SP ground truth JSON from Person A (e.g. "./data/features.json")
# B-full / aux-head: per-split feature CSVs. Used to synthesize bare-numbers targets and
# to provide GT scalars for the auxiliary regression head. Keys: "train", "val".
features_csv:
  train: "/ocean/projects/cis260125p/shared/data/features_pyannote/train-100.csv"
  val:   "/ocean/projects/cis260125p/shared/data/features_pyannote/dev.csv"
num_workers: 4
pin_memory: true

# ── B-full multi-task loss weights ──────────────────────────
# loss = lambda_prose * lm_ce_prose + lambda_nums * lm_ce_nums + lambda_mse * masked_mse
# Setting lambda_nums = lambda_mse = 0 collapses to legacy prose-only training.
#
# REVERTED to v2 weights after v3 (0.1/1.0/0.5) regressed: SFS_F1 dropped 0.566 → 0.412
# (-27%), precision dropped 0.43 → 0.29 (-32%), filler-loop degeneration tripled
# (6.3% → 18.8%), F0_mean bias tripled (+18 Hz → +53 Hz). Conditional analysis on
# non-degenerate clips matched by filename (n=26): v3 lost 0/13 features on within-
# tolerance%. Lambdas are not the lever — both nums-CE and MSE overfit harder under
# more weight, while pulling λ_prose to 0.1 caused LM to drift off-distribution
# (pretraining-residue filler text). The bottleneck is audio→adapter→prefix→digit
# capacity, not loss-weight allocation. v2 was still climbing monotonically at
# epoch 10 (precision hadn't plateaued); the cheapest next experiment is "v2 longer."
lambda_prose: 1.0   # prose CE — primary task (also serves as on-distribution regularizer)
lambda_nums:  0.3   # bare-numbers target CE — auxiliary scaffolding for adapter
lambda_mse:   0.3   # aux regression head MSE — normalized; direct adapter→scalar mapping

# ── Evaluation ──────────────────────────
eval_every_epoch: 1
# Prose prompt — the one inference always uses. Same string the legacy training used.
prompt: "Describe the quality of this recording."
prompt_prose: "Describe the quality of this recording."
# B-full's bare-numbers target gets its OWN prompt during training. The LM learns
# "after prompt_nums, emit snr=...; after prompt_prose, emit prose." At inference we
# only feed prompt_prose, so the LM produces prose only — no bare-numbers prefix
# eating the token budget. (When this key is absent, both forwards share the prose
# prompt and inference mixes the two formats.)
prompt_nums:  "List the numerical features of this recording:"
val_sfs_n: 32  # bumped from 8 — 8 was too noisy to read F1 trends across epochs

# ── Generation ──────────────────────────
temperature: 1.0  # < 1.0 = sharper (approaches greedy at ~0), > 1.0 = more random
top_k: 0          # 0 = disabled, > 0 = sample from top-k tokens
top_p: 1.0        # 1.0 = disabled, < 1.0 = nucleus sampling

# ── Saving ──────────────────────────
save_dir: "/ocean/projects/cis260125p/shared/checkpoints"

# ── Logging ──────────────────────────
wandb_project: "idl-ablation"
wandb_run_name: null
log_every: 10

