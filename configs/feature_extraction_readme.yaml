Install before run:
pip install torchaudio pyannote.audio pandas numpy torch

How to run:
1. With overlap detection (requires HF token for pyannote):
python src/feature_extractor.py --audio_dir ./audio_samples --output features.csv --hf_token YOUR_HF_TOKEN
2. Without overlap detection (no token needed, faster):
python src/feature_extractor.py --audio_dir ./audio_samples --output features.csv --no_overlap