# ── v18 bottleneck (faithfulness-by-construction) ──────────────────────────────
# grounding_mode: bottleneck swaps v17's softmax attention map for a per-feature
# hard-concrete keep-mask (Louizos 1712.01312) + IBA noise substitution
# (2001.00396). v17 keeps grounding_mode omitted/softmax → bit-identical ablation.
grounding_mode: bottleneck
# Per-feature bits penalty Σ_f β_f·meanbits(λ_f), SUPERVISED_FEATURES order keys.
# GLOBAL features (snr, srmr, f0_mean, f0_sd, speaking_rate) get β=0 — a diffuse
# mask is the FAITHFUL answer for a clip-global attribute, never penalized. Only the
# localizable features pay bits: overlap_ratio (0.05, the oracle-GT feature),
# pause_count/pause_rate (0.02 each).
bits_beta_per_feature:
  snr: 0.0
  srmr: 0.0
  f0_mean: 0.0
  f0_sd: 0.0
  speaking_rate: 0.0
  pause_count: 0.02
  pause_rate: 0.02
  overlap_ratio: 0.05
# Global bits-term weight (multiplies the β-weighted Σβ·meanbits). Warmed in over
# bits_warmup_epochs so the readout learns to predict from the FULL representation
# before the bottleneck starts squeezing, then ramps over the remaining epochs.
bits_lambda: 1.0
bits_warmup_epochs: 3
# ── v20 DIRECT overlap-map supervision (the strongest grounding claim) ─────────
# Segmentation-style loss on the OVERLAP query's 2D map vs the oracle
# overlap_segments that already live in every .pt. The map is marginalized over the
# 8 BEATs frequency bins to a per-time activation and compared to a time-mask target
# (1 where a patch-time-bin intersects an overlap span, 0 elsewhere; soft = covered
# fraction). Soft-Dice handles the short-overlap class imbalance. Overlap-bearing
# clips get a POSITIVE term (map must land on the region); clean clips get a
# low-activation term (overlap map → empty, supporting the hedging story). This
# UPGRADES the WEAK scalar-only supervision (a diffuse map predicts overlap_ratio as
# well as a sharp one) to DIRECT frame-level supervision of the one feature with
# oracle ground truth. Additive + config-gated: lambda_overlap_map=0.0 is an exact
# no-op, and it works in BOTH grounding_mode softmax (v17, for an ablation) and
# bottleneck (v18, here). Combined with faithfulness-by-construction, the strongest
# grounding result.
lambda_overlap_map: 0.5
# 'max' (NOT 'mean') frequency marginalization. A softmax attention row sums to 1 over
# P, so mean-over-freq sums to exactly 1/F_P for every clip → mass-conserved, no
# gradient to shape the map (and an absolute-thresholded IoU reads 0). Max is not
# mass-conserving: a peaked row → high per-time max, a diffuse one → low, so the map
# trains in BOTH softmax (ablation) and bottleneck (headline) modes.
overlap_map_reduce: max           # 'max' | 'mean' frequency marginalization
overlap_map_empty_weight: 1.0     # weight on the clean-clip low-activation term
overlap_target_soft: true         # soft per-bin covered fraction vs hard 0/1
# Concrete temperature anneal (start→end, linear across epochs) so the keep-mask
# sharpens toward true 0/1 by the end of training.
concrete_temp_start: 1.0
concrete_temp_end: 0.3
